<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activité 2 - Actualités Burkina 2026</title>
    <style>
        :root {
            --primary: #1b5e20;
            --accent: #4CAF50;
            --wrong: #d32f2f;
            --correct: #388E3C;
            --bg: #f5f5f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .score-box { position: sticky; top: 10px; background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 10px; font-weight: bold; font-size: 1.2rem; z-index: 1000; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        h1 { color: var(--primary); text-align: center; margin-top: 20px; }
        .q-card { background: #fff; border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 12px; border-left: 5px solid #1b5e20; }
        .q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        button:hover:not(:disabled) { background: #f1f8e9; border-color: var(--accent); }
        .btn-correct { background: #c8e6c9 !important; border-color: var(--correct) !important; color: #1b5e20; font-weight: bold; }
        .btn-wrong { background: #ffcdd2 !important; border-color: var(--wrong) !important; color: #b71c1c; }
        .nav-btns { text-align: center; margin-top: 40px; }
        .btn-home { text-decoration: none; color: var(--primary); font-weight: bold; padding: 10px 20px; border: 2px solid var(--primary); border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-box" id="score-float">Votre Score : 0 / 50</div>
    
    <h1>Activité 2 : Souveraineté & Développement 2026</h1>

    <div id="quiz-list"></div>

    <div class="nav-btns">
        <a href="../index.html" class="btn-home">⬅ Retour au menu principal</a>
    </div>
</div>

<script>
    const quizData = [
        { q: "Quel est le nom du traité créant la Confédération des États du Sahel ?", a: "Le Traité du Liptako-Gourma", o: ["Le Traité de Ouaga", "Le Traité du Liptako-Gourma", "L'Accord de Bamako", "Le Pacte du Sahel"] },
        { q: "Quelle ville a accueilli le premier sommet des chefs d'État de l'AES ?", a: "Niamey", o: ["Ouagadougou", "Bamako", "Niamey", "Dori"] },
        { q: "Quel nouveau média de l'AES a été lancé pour contrer la propagande ?", a: "La Web TV de l'AES", o: ["Sahel Info", "La Web TV de l'AES", "Afrique Média", "Radio Sahel"] },
        { q: "Quel pays est le principal acheteur de l'or burkinabè en 2026 ?", a: "La Chine et l'Inde", o: ["La France", "La Suisse", "La Chine et l'Inde", "Les USA"] },
        { q: "Quel grand barrage hydroélectrique fait l'objet d'une rénovation majeure en 2026 ?", a: "Bagré", o: ["Bagré", "Kompienga", "Yalgo", "Ziga"] },
        { q: "Comment s'appelle l'institution qui remplace l'ancienne force G5 Sahel ?", a: "La Force conjointe de l'AES", o: ["Barkhane", "La Force conjointe de l'AES", "MINUSMA", "Takuba"] },
        { q: "Quelle plante oléagineuse est massivement promue pour l'huile locale ?", a: "Le Soja", o: ["Le Palmier", "Le Soja", "L'Arachide", "Le Tournesol"] },
        { q: "Dans quel domaine le Burkina a-t-il signé un accord avec l'agence spatiale russe ?", a: "Imagerie satellite et météo", o: ["Voyage habité", "Imagerie satellite et météo", "Télécoms uniquement", "Rien du tout"] },
        { q: "Quelle province est devenue le pôle de production du blé burkinabè ?", a: "Le Sourou", o: ["Le Kadiogo", "Le Sourou", "Le Houet", "Le Poni"] },
        { q: "Quel est l'objectif du Fonds de Soutien Patriotique (FSP) ?", a: "Financer la lutte contre le terrorisme", o: ["Payer les fonctionnaires", "Financer la lutte contre le terrorisme", "Construire des stades", "Acheter des voitures"] },
        { q: "Qui est le Ministre de la Défense en 2026 ?", a: "Général Kassoum Coulibaly", o: ["Général Kassoum Coulibaly", "Colonel Simporé", "Capitaine Traoré", "Barthélémy Simporé"] },
        { q: "Quelle plateforme numérique permet de dénoncer les complots ?", a: "L'application de veille citoyenne", o: ["WhatsApp", "L'application de veille citoyenne", "Facebook", "Twitter"] },
        { q: "Quel complexe industriel a été lancé à Bobo pour le coton ?", a: "CHIMINTER", o: ["CHIMINTER", "SOFITEX", "Faso Fani", "FILSAH"] },
        { q: "Quelle est la part de l'or dans les recettes d'exportation ?", a: "Plus de 70%", o: ["10%", "30%", "50%", "Plus de 70%"] },
        { q: "Quelle mesure encourage le port du Faso Dan Fani à l'école ?", a: "Le port obligatoire du 'Lébissi'", o: ["L'uniforme kaki", "Le port obligatoire du 'Lébissi'", "Le port libre", "Le port du jean"] },
        { q: "Quelle est la mission de la nouvelle Agence de Sécurité Radiologique ?", a: "Contrôler le nucléaire civil", o: ["Gérer les rayons X", "Contrôler le nucléaire civil", "Surveiller le soleil", "Nettoyer les hôpitaux"] },
        { q: "Quelle institution financière de l'AES doit voir le jour à Bamako ?", a: "La Banque d'investissement de l'AES", o: ["La Banque d'investissement de l'AES", "Le Trésor public", "La Banque Mondiale", "La BCEAO"] },
        { q: "Quel pays fournit les nouvelles technologies de radar au Burkina ?", a: "La Russie et l'Iran", o: ["La France", "La Russie et l'Iran", "Le Canada", "L'Italie"] },
        { q: "Quelle ville abrite l'usine de transformation de noix de cajou ?", a: "Banfora", o: ["Gaoua", "Banfora", "Ouaga", "Dédougou"] },
        { q: "Quel est le slogan du Burkina Faso pour la COP 2026 ?", a: "Souveraineté environnementale", o: ["Reverdir le Sahel", "Souveraineté environnementale", "Aide climatique", "Stop pollution"] },
        { q: "Comment sont appelés les nouveaux centres de santé communautaires ?", a: "CSPS de proximité renforcée", o: ["Hôpitaux", "CSPS de proximité renforcée", "Cliniques", "Dispensaires"] },
        { q: "Quel projet vise à interconnecter les douanes de l'AES ?", a: "Le système SIGAD-AES", o: ["Le Passeport", "Le système SIGAD-AES", "Le tarif commun", "La libre circulation"] },
        { q: "Quel est le nom de la nouvelle compagnie aérienne nationale ?", a: "Air Burkina (Restructuré)", o: ["Air Faso", "Air Burkina (Restructuré)", "Sahel Fly", "Faso Wings"] },
        { q: "Dans quelle ville se trouve l'école nationale des VDP ?", a: "Loumbila", o: ["Pô", "Loumbila", "Koulikoro", "Ouahigouya"] },
        { q: "Quel est l'insecte combattu pour protéger les récoltes de mil ?", a: "La chenille légionnaire", o: ["Le criquet", "La chenille légionnaire", "La mouche", "L'abeille"] },
        { q: "Quelle ressource naturelle est extraite à Perkoa ?", a: "Le Zinc", o: ["L'Or", "Le Zinc", "L'Argent", "Le Cuivre"] },
        { q: "Quelle est la date anniversaire du soulèvement populaire de 1966 ?", a: "3 Janvier", o: ["3 Janvier", "15 Octobre", "31 Octobre", "4 Août"] },
        { q: "Qui préside l'Assemblée Législative de Transition (ALT) ?", a: "Ousmane Bougouma", o: ["Ousmane Bougouma", "Me Bénéwendé Sankara", "Alassane Sakandé", "Salifou Diallo"] },
        { q: "Quel pays africain est le premier allié diplomatique hors AES ?", a: "Le Togo", o: ["Le Sénégal", "Le Togo", "Le Ghana", "Le Nigeria"] },
        { q: "Quelle est la durée de la nouvelle transition actée en 2024 ?", a: "5 ans", o: ["2 ans", "3 ans", "5 ans", "10 ans"] },
        { q: "Quel minerai est nécessaire pour la fabrication locale de batteries ?", a: "Le Lithium", o: ["L'Or", "Le Lithium", "Le Fer", "Le Cobalt"] },
        { q: "Quelle est la fonction du Conseil National de la Transition ?", a: "Légiférer", o: ["Exécuter", "Légiférer", "Juger", "Surveiller"] },
        { q: "Quel festival promeut la culture Moaga à Ouaga ?", a: "Le Naaba Koom", o: ["Le SIAO", "Le Naaba Koom", "La SNC", "Le FESPACO"] },
        { q: "Quel est le nom de la nouvelle carte d'identité biométrique ?", a: "CNIB biométrique sécurisée", o: ["Carte CEDEAO", "CNIB biométrique sécurisée", "Passeport", "Carte de vote"] },
        { q: "Dans quelle région se trouve le barrage de Samendeni ?", a: "Hauts-Bassins", o: ["Cascades", "Hauts-Bassins", "Mouhoun", "Sud-Ouest"] },
        { q: "Quelle est l'épice burkinabè exportée mondialement ?", a: "Le Soumbala", o: ["Le Poivre", "Le Soumbala", "Le Gingembre", "Le Piment"] },
        { q: "Quel est le but de la 'Journée de l'excellence' ?", a: "Récompenser les meilleurs élèves", o: ["Fêter", "Récompenser les meilleurs élèves", "Vendre des livres", "Chanter"] },
        { q: "Quel est le symbole du parti au pouvoir (historique) ?", a: "Le Flambeau", o: ["L'Épi", "Le Flambeau", "Le Lion", "Le Soleil"] },
        { q: "Quelle ville est appelée 'la cité de Banh' ?", a: "Ouahigouya", o: ["Ouahigouya", "Titao", "Dori", "Djibo"] },
        { q: "Qui est le ministre de l'économie et des finances ?", a: "Aboubakar Nacanabo", o: ["Aboubakar Nacanabo", "Lassané Kaboré", "Seglaro Abel Somé", "Alpha Barry"] },
        { q: "Quel est le principal défi de l'éducation en 2026 ?", a: "La réouverture des écoles fermées", o: ["Internet", "La réouverture des écoles fermées", "Les uniformes", "Le sport"] },
        { q: "Quel est le rôle du 'Médiateur du Faso' ?", a: "Régler les litiges citoyens-administration", o: ["Négocier la paix", "Régler les litiges citoyens-administration", "Gérer l'argent", "Voter les lois"] },
        { q: "Quelle est la boisson nationale à base de petit mil ?", a: "Le Dolo", o: ["Le Jus d'orange", "Le Dolo", "Le Thé", "Le Bisap"] },
        { q: "Quel est le nom du nouveau quartier administratif de Ouaga ?", a: "Ouaga 2000", o: ["Ziniaré", "Ouaga 2000", "Pissy", "Dassasgho"] },
        { q: "Combien d'États compte la Confédération de l'AES ?", a: "3", o: ["3", "5", "8", "15"] },
        { q: "Quel est le nom de la colline sacrée à Ouahigouya ?", a: "Naaba Kango", o: ["Naaba Kango", "Sya", "Ténakourou", "Yatenga"] },
        { q: "Quelle est l'utilité du code QR sur les nouveaux diplômes ?", a: "Lutter contre la fraude", o: ["Faire joli", "Lutter contre la fraude", "Accéder à Internet", "Payer"] },
        { q: "Quel pays de l'AES est le plus vaste ?", a: "Le Niger", o: ["Le Burkina", "Le Mali", "Le Niger", "Le Tchad"] },
        { q: "Comment s'appelle l'organe de régulation des médias ?", a: "Le CSC", o: ["Le CSC", "Le CSA", "L'ARCEP", "Le CNC"] },
        { q: "Quelle est la couleur dominante du drapeau de l'AES ?", a: "Vert-Jaune-Rouge", o: ["Bleu-Blanc-Rouge", "Vert-Jaune-Rouge", "Jaune-Rouge-Noir", "Vert-Blanc"] }
    ];

    let score = 0;
    const list = document.getElementById('quiz-list');

    function init() {
        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `<span class="q-text">${i+1}. ${item.q}</span><div class="options" id="options-${i}"></div>`;
            list.appendChild(card);

            const optDiv = document.getElementById(`options-${i}`);
            item.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    // Signale que l'activité 2 est faite
                    localStorage.setItem('status_activite2', 'done');
                    
                    const allBtns = optDiv.querySelectorAll('button');
                    allBtns.forEach(b => b.disabled = true);
                    if(opt === item.a) {
                        btn.classList.add('btn-correct');
                        score++;
                    } else {
                        btn.classList.add('btn-wrong');
                        allBtns.forEach(b => { if(b.innerText === item.a) b.classList.add('btn-correct'); });
                    }
                    document.getElementById('score-float').innerText = `Votre Score : ${score} / 50`;
                };
                optDiv.appendChild(btn);
            });
        });
    }
    init();
</script>
</body>
</html>
