<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activité 4 - Actualités Burkina 2026</title>
    <style>
        :root {
            --primary: #FFD700; /* Jaune (Étoile du drapeau) */
            --secondary: #2E7D32; /* Vert */
            --dark-red: #d32f2f; /* Rouge */
            --wrong: #d32f2f;
            --correct: #388E3C;
            --bg: #f5f5f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .score-box { position: sticky; top: 10px; background: var(--dark-red); color: white; padding: 15px; text-align: center; border-radius: 10px; font-weight: bold; font-size: 1.2rem; z-index: 1000; box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-bottom: 4px solid var(--primary); }
        h1 { color: var(--secondary); text-align: center; margin-top: 20px; text-transform: uppercase; }
        .q-card { background: #fff; border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 12px; border-left: 5px solid var(--primary); }
        .q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        button:hover:not(:disabled) { background: #fdfdfd; border-color: var(--secondary); }
        .btn-correct { background: #c8e6c9 !important; border-color: var(--correct) !important; color: #1b5e20; font-weight: bold; }
        .btn-wrong { background: #ffcdd2 !important; border-color: var(--wrong) !important; color: #b71c1c; }
        .nav-btns { text-align: center; margin-top: 40px; }
        .btn-home { text-decoration: none; color: var(--secondary); font-weight: bold; padding: 10px 20px; border: 2px solid var(--secondary); border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-box" id="score-float">Votre Score : 0 / 50</div>
    
    <h1>Activité 4 : Souveraineté & Institutions 2026</h1>

    <div id="quiz-list"></div>

    <div class="nav-btns">
        <a href="../index.html" class="btn-home">⬅ Retour au menu principal</a>
    </div>
</div>

<script>
    const quizData = [
        { q: "Quel est le principe fondamental de l'APEC au Burkina en 2026 ?", a: "L'Actionnariat Populaire", o: ["La Privatisation", "L'Actionnariat Populaire", "L'Aide Étrangère", "Le Prêt FMI"] },
        { q: "Quelle usine de transformation de sucre a été relancée à Banfora ?", a: "SN SOSUCO", o: ["SN SOSUCO", "Faso Tomate", "SOPROFA", "SN CITEC"] },
        { q: "Quel pays assure le commandement de la Force AES en Janvier 2026 ?", a: "Le Mali", o: ["Le Burkina Faso", "Le Mali", "Le Niger", "Le Tchad"] },
        { q: "Quel est l'objectif du projet 'Une Famille, un Toit' lancé en 2026 ?", a: "Le logement social souverain", o: ["La vente de terrains", "Le logement social souverain", "L'expropriation", "Le tourisme"] },
        { q: "Quelle institution remplace le Médiateur du Faso en 2026 ?", a: "Le Conseil des Sages et de la Médiation", o: ["Le Sénat", "Le Conseil des Sages et de la Médiation", "La Haute Cour", "Le Tribunal populaire"] },
        { q: "Dans quelle ville se situe le siège de l'usine de transformation de riz 'Faso Riz' ?", a: "Dédougou", o: ["Ouagadougou", "Dédougou", "Koudougou", "Fada N'Gourma"] },
        { q: "Quel est le rôle du Fonds Burkinabè de Développement Économique et Social (FBDES) ?", a: "Financer les entreprises locales", o: ["Gérer la dette", "Financer les entreprises locales", "Payer les ministres", "Acheter des armes"] },
        { q: "Quel minéral stratégique pour l'électronique est prospecté à Gaoua ?", a: "Le Cuivre", o: ["L'Or", "Le Cuivre", "Le Diamant", "Le Charbon"] },
        { q: "Quelle mesure favorise la consommation locale dans les cantines ?", a: "Le 'Consommons Burkinabè' obligatoire", o: ["L'importation de riz", "Le 'Consommons Burkinabè' obligatoire", "Le jeûne national", "La baisse des prix du pain"] },
        { q: "Quel est le nouveau délai pour obtenir un agrément commercial en 2026 ?", a: "24 heures (Digital)", o: ["1 mois", "24 heures (Digital)", "15 jours", "6 mois"] },
        { q: "Quel pays de l'AES possède les plus grandes réserves de pétrole ?", a: "Le Niger", o: ["Le Burkina", "Le Mali", "Le Niger", "L'Algérie"] },
        { q: "Quelle grande école militaire forme les officiers à Pô ?", a: "L'Académie Militaire Georges Namoano", o: ["L'EMIA", "L'Académie Militaire Georges Namoano", "L'ENAREF", "L'ENAM"] },
        { q: "Quelle ville accueille le grand barrage de retenue de Bagré-Aval ?", a: "Bagré", o: ["Bagré", "Ziga", "Yalgo", "Dori"] },
        { q: "Quel est l'objectif du 'Service National pour le Développement' (SND) ?", a: "Le patriotisme et la formation", o: ["Le travail forcé", "Le patriotisme et la formation", "La guerre", "Le sport uniquement"] },
        { q: "Quelle culture de substitution au blé est promue par l'INERA ?", a: "Le Farine de Sorgho et Maïs", o: ["Le Riz", "Le Farine de Sorgho et Maïs", "Le Blé dur", "Le Mil"] },
        { q: "Quelle fête nationale commémore le 4 Août 1983 ?", a: "La Révolution", o: ["L'Indépendance", "La Révolution", "La fête du travail", "La fête de l'armée"] },
        { q: "Qui est le Ministre de la Justice en 2026 ?", a: "Edasso Rodrigue Bayala", o: ["Edasso Rodrigue Bayala", "Me Barthélémy Kéré", "Victoria Ouédraogo", "Alpha Barry"] },
        { q: "Quel port de la sous-région est devenu le partenaire principal ?", a: "Lomé (Togo)", o: ["Abidjan (RCI)", "Lomé (Togo)", "Cotonou (Bénin)", "Dakar (Sénégal)"] },
        { q: "Quelle institution gère l'actionnariat populaire ?", a: "L'APEC", o: ["La Douane", "L'APEC", "La Banque Centrale", "Le Trésor"] },
        { q: "Quel est le thème du 11 Décembre 2025/2026 ?", a: "Souveraineté et Résilience", o: ["Paix et Unité", "Souveraineté et Résilience", "Développement durable", "Intégration régionale"] },
        { q: "Quelle ville abrite l'usine de piles et accumulateurs ?", a: "Bobo-Dioulasso", o: ["Ouagadougou", "Bobo-Dioulasso", "Banfora", "Koudougou"] },
        { q: "Quelle institution remplace l'Assemblée Nationale ?", a: "L'Assemblée Législative de Transition (ALT)", o: ["Le Parlement", "L'Assemblée Législative de Transition (ALT)", "Le Sénat", "La Chambre haute"] },
        { q: "Quel projet numérique sécurise le bétail au Burkina ?", a: "Le marquage électronique (Puce)", o: ["La peinture", "Le marquage électronique (Puce)", "La surveillance par drone", "Rien"] },
        { q: "Quelle est la monnaie de compte au sein de la Confédération AES ?", a: "Le Souverain (Projet)", o: ["L'Eco", "Le Souverain (Projet)", "Le Dollar", "Le Franc CFA"] },
        { q: "Quel pays fournit l'expertise pour la fibre optique nationale ?", a: "La Chine", o: ["La France", "La Chine", "Les USA", "Le Mali"] },
        { q: "Quelle ville est la capitale du cuir au Burkina ?", a: "Ouagadougou", o: ["Bobo", "Kaya", "Ouagadougou", "Dori"] },
        { q: "Quel est le but de la 'Caisse d'Assurance Maladie des Armées' ?", a: "Soigner les militaires et VDP", o: ["Vendre des médicaments", "Soigner les militaires et VDP", "Acheter des tenues", "Gérer les retraites"] },
        { q: "Quel fleuve est exploité pour le projet pôle de croissance du Sourou ?", a: "Le Mouhoun", o: ["Le Niger", "Le Mouhoun", "Le Nakambé", "Le Nazinon"] },
        { q: "Quelle est l'épouse de Thomas Sankara (Réhabilitation historique) ?", a: "Mariam Sankara", o: ["Mariam Sankara", "Chantal Compaoré", "Sika Kaboré", "Marguerite Lamizana"] },
        { q: "Dans quelle région se trouve la mine d'or d'Essakane ?", a: "Sahel", o: ["Nord", "Sahel", "Centre", "Ouest"] },
        { q: "Quel est le nom de la compagnie de transport ferroviaire nationale ?", a: "SOPAFER-B", o: ["SITARAIL", "SOPAFER-B", "Trans-Sahel", "Faso-Rail"] },
        { q: "Quel minéral est utilisé dans la construction des routes modernes ?", a: "Le Granit", o: ["Le Sable", "Le Granit", "Le Marbre", "Le Phosphate"] },
        { q: "Quelle est la langue de travail de l'AES ?", a: "Le Français (Transitionnel)", o: ["L'Anglais", "Le Français (Transitionnel)", "Le Russe", "Le Chinois"] },
        { q: "Quelle institution protège les droits de l'homme en 2026 ?", a: "La CNDH", o: ["Amnesty", "La CNDH", "Le Tribunal", "Le Maire"] },
        { q: "Quel est le nom du nouveau quartier des affaires à Ouaga ?", a: "ZACA", o: ["ZACA", "Zone 1", "Dassasgho", "Gounghin"] },
        { q: "Qui est le président de la commission de l'AES ?", a: "Mandat tournant", o: ["Ibrahim Traoré", "Assimi Goïta", "Abdourahamane Tiani", "Mandat tournant"] },
        { q: "Quelle ville est célèbre pour son artisanat de bronze ?", a: "Ouagadougou", o: ["Bobo", "Banfora", "Ouagadougou", "Koudougou"] },
        { q: "Quel est l'avantage du régime fiscal 'Souverain' ?", a: "Zéro taxe pour les start-ups locales", o: ["Plus d'impôts", "Zéro taxe pour les start-ups locales", "Taxe sur l'export", "Taxe sur le bétail"] },
        { q: "Quelle est la durée de validité de la nouvelle CNIB ?", a: "10 ans", o: ["5 ans", "10 ans", "15 ans", "2 ans"] },
        { q: "Quel est l'objectif du programme 'Faso Green' ?", a: "La reforestation massive", o: ["L'exportation", "La reforestation massive", "La construction", "Le sport"] },
        { q: "Quel instrument de musique est le plus célèbre au Burkina ?", a: "Le Balafon", o: ["Le Balafon", "La Guitare", "Le Piano", "Le Violon"] },
        { q: "Quelle province abrite le sanctuaire de granit de Laongo ?", a: "Oubritenga", o: ["Kadiogo", "Oubritenga", "Bazèga", "Boulkiemdé"] },
        { q: "Qui a écrit 'Hymne à la Liberté' ?", a: "Nazi Boni", o: ["Thomas Sankara", "Nazi Boni", "Norbert Zongo", "Ki-Zerbo"] },
        { q: "Quel est le nom de la télévision privée la plus suivie ?", a: "BF1", o: ["RTB", "BF1", "Burkina Info", "LTV"] },
        { q: "Quelle ville est la capitale mondiale du Karité ?", a: "Ouagadougou", o: ["Bobo", "Ouagadougou", "Banfora", "Gaoua"] },
        { q: "Quel pays de l'AES possède le plus de pétrole exploité ?", a: "Le Niger", o: ["Le Mali", "Le Niger", "Le Burkina", "Le Tchad"] },
        { q: "Quel est le but de la journée de l'excellence ?", a: "Promouvoir les meilleurs", o: ["Récompenser", "Promouvoir les meilleurs", "Vendre", "Fêter"] },
        { q: "Qui gère les frontières en 2026 ?", a: "La Police des Frontières de l'AES", o: ["La Gendarmerie", "La Police des Frontières de l'AES", "L'ONU", "L'UA"] },
        { q: "Quelle est la devise du Burkina (depuis 2024/25) ?", a: "La Patrie ou la Mort, nous vaincrons !", o: ["Unité-Progrès-Justice", "La Patrie ou la Mort, nous vaincrons !", "Liberté-Égalité", "Force-Honneur"] },
        { q: "Quel est le but final de la transition en 2026 ?", a: "La souveraineté totale et la sécurité", o: ["Les élections rapides", "La souveraineté totale et la sécurité", "Le commerce", "L'exil"] }
    ];

    let score = 0;
    const list = document.getElementById('quiz-list');

    function init() {
        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `<span class="q-text">${i+1}. ${item.q}</span><div class="options" id="options-${i}"></div>`;
            list.appendChild(card);

            const optDiv = document.getElementById(`options-${i}`);
            item.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    // Signale que l'activité 4 est faite pour l'index
                    localStorage.setItem('status_activite4', 'done');
                    
                    const allBtns = optDiv.querySelectorAll('button');
                    allBtns.forEach(b => b.disabled = true);
                    if(opt === item.a) {
                        btn.classList.add('btn-correct');
                        score++;
                    } else {
                        btn.classList.add('btn-wrong');
                        allBtns.forEach(b => { if(b.innerText === item.a) b.classList.add('btn-correct'); });
                    }
                    document.getElementById('score-float').innerText = `Votre Score : ${score} / 50`;
                };
                optDiv.appendChild(btn);
            });
        });
    }
    init();
</script>
</body>
</html>
