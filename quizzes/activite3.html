<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activité 3 - Actualités Burkina 2026</title>
    <style>
        :root {
            --primary: #c62828; /* Rouge foncé patriotique */
            --accent: #4CAF50;
            --wrong: #d32f2f;
            --correct: #388E3C;
            --bg: #f5f5f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .score-box { position: sticky; top: 10px; background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 10px; font-weight: bold; font-size: 1.2rem; z-index: 1000; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        h1 { color: var(--primary); text-align: center; margin-top: 20px; }
        .q-card { background: #fff; border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 12px; border-left: 5px solid var(--primary); }
        .q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        button:hover:not(:disabled) { background: #fff9f9; border-color: var(--primary); }
        .btn-correct { background: #c8e6c9 !important; border-color: var(--correct) !important; color: #1b5e20; font-weight: bold; }
        .btn-wrong { background: #ffcdd2 !important; border-color: var(--wrong) !important; color: #b71c1c; }
        .nav-btns { text-align: center; margin-top: 40px; }
        .btn-home { text-decoration: none; color: var(--primary); font-weight: bold; padding: 10px 20px; border: 2px solid var(--primary); border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-box" id="score-float">Votre Score : 0 / 50</div>
    
    <h1>Activité 3 : Culture, Économie & Défense 2026</h1>

    <div id="quiz-list"></div>

    <div class="nav-btns">
        <a href="../index.html" class="btn-home">⬅ Retour au menu principal</a>
    </div>
</div>

<script>
    const quizData = [
        { q: "Quel événement culturel majeur se tient à Bobo-Dioulasso en 2026 ?", a: "La Semaine Nationale de la Culture (SNC)", o: ["Le FESPACO", "La Semaine Nationale de la Culture (SNC)", "Le SIAO", "FITMO"] },
        { q: "Comment s'appelle l'ambition de produire tout ce que nous consommons ?", a: "La Souveraineté alimentaire", o: ["Le Libre-échange", "La Souveraineté alimentaire", "L'Import-export", "La Globalisation"] },
        { q: "Quel port sec facilite le transit des marchandises vers Ouahigouya en 2026 ?", a: "Le Port Sec de Ouaga-Inter", o: ["Port de Lomé", "Port Sec de Ouaga-Inter", "Port de Bobo", "Port de Niamey"] },
        { q: "Quel est le nom du nouveau système de santé universel lancé par la Transition ?", a: "L'AMU (Assurance Maladie Universelle)", o: ["RAMU", "L'AMU (Assurance Maladie Universelle)", "CNSS", "CAMEG"] },
        { q: "En 2026, quel grand barrage solaire est en extension à Kodéni ?", a: "La Centrale de Kodéni", o: ["Zagtouli", "La Centrale de Kodéni", "Pâ", "Nagréongo"] },
        { q: "Quelle plateforme regroupe les armées du Burkina, Mali et Niger ?", a: "L'État-Major de la Confédération AES", o: ["L'OTAN", "L'État-Major de la Confédération AES", "ECOMOG", "G5 Sahel"] },
        { q: "Quel produit burkinabè est surnommé 'l'or vert' ?", a: "L'Anacarde (Noix de cajou)", o: ["Le Coton", "Le Sésame", "L'Anacarde (Noix de cajou)", "Le Haricot"] },
        { q: "Dans quelle ville se trouve l'usine de montage de tracteurs ?", a: "Bobo-Dioulasso", o: ["Ouagadougou", "Koudougou", "Bobo-Dioulasso", "Ziniaré"] },
        { q: "Quel est le thème de la journée nationale de l'arbre en 2026 ?", a: "Un Burkinabè, un arbre pour la vie", o: ["Reverdir le Sahel", "Un Burkinabè, un arbre pour la vie", "Forêt et Eau", "Stop Désert"] },
        { q: "Quelle est la part du budget allouée à l'éducation en 2026 ?", a: "Environ 20%", o: ["5%", "10%", "Environ 20%", "40%"] },
        { q: "Quel est l'ancien nom de la ville de Bobo-Dioulasso ?", a: "Sya", o: ["Sya", "Gounghin", "Yatenga", "Pouni"] },
        { q: "Quel fleuve burkinabè possède un grand potentiel de pêche à Bagré ?", a: "Le Nakambé", o: ["Le Mouhoun", "Le Nakambé", "Le Nazinon", "Le Niger"] },
        { q: "Qui est le ministre de la Communication en 2026 ?", a: "Jean-Emmanuel Ouédraogo", o: ["Jean-Emmanuel Ouédraogo", "Alpha Barry", "Lionel Bilgo", "Ousséni Tamboura"] },
        { q: "Quelle usine de transformation de phosphate se trouve à Kpéré ?", a: "Faso Phosphate", o: ["Faso Phosphate", "Propharm", "SOFITEX", "Bravofaso"] },
        { q: "Quelle plateforme numérique permet de payer ses taxes en 2026 ?", a: "e-Sintax", o: ["e-Sintax", "PayPal", "FasoPay", "Orange Money"] },
        { q: "Quel pays de l'AES est le plus gros producteur d'uranium ?", a: "Le Niger", o: ["Le Burkina", "Le Mali", "Le Niger", "Le Sénégal"] },
        { q: "Quel monument à Ouaga rend hommage aux martyrs ?", a: "Le Monument des Héros Nationaux", o: ["La Place de la Nation", "Le Monument des Héros Nationaux", "Le Cinquantenaire", "Le Grand Marché"] },
        { q: "Quel est le but de la 'Banque des Terres' ?", a: "Aménager des espaces pour les agriculteurs", o: ["Vendre du sable", "Aménager des espaces pour les agriculteurs", "Construire des hôtels", "Gérer les parcs"] },
        { q: "Quel est l'animal sauvage protégé au parc d'Arly ?", a: "Le Lion", o: ["Le Lion", "L'Ours", "Le Tigre", "Le Loup"] },
        { q: "Quelle ville accueille le siège de la Chambre de Commerce ?", a: "Ouagadougou", o: ["Bobo-Dioulasso", "Ouagadougou", "Koudougou", "Banfora"] },
        { q: "Quel pays aide le Burkina pour le projet de centrale nucléaire civile ?", a: "La Russie (Rosatom)", o: ["La France", "La Russie (Rosatom)", "La Chine", "Les USA"] },
        { q: "Quel est le nom du nouveau code du travail adopté en transition ?", a: "Code du Travail Souverain", o: ["Code Civil", "Code du Travail Souverain", "Code Social", "Loi Fondamentale"] },
        { q: "Quelle ville est célèbre pour ses cascades ?", a: "Banfora", o: ["Banfora", "Gaoua", "Dédougou", "Kaya"] },
        { q: "Quel est l'avantage du passeport AES ?", a: "Libre circulation sans visa dans l'AES", o: ["Voyager en Europe", "Libre circulation sans visa dans l'AES", "Gratuité du transport", "Accès aux USA"] },
        { q: "Quelle fête célèbre la fin des récoltes en pays Mossi ?", a: "Le Basga", o: ["Le Basga", "La Tabaski", "Noël", "La SNC"] },
        { q: "Quel est le taux de croissance visé par le Burkina en 2026 ?", a: "Plus de 6%", o: ["0%", "2%", "Plus de 6%", "15%"] },
        { q: "Comment s'appelle l'agence qui gère les infrastructures routières ?", a: "L'AGEROUTE", o: ["La Police", "L'AGEROUTE", "Le Ministère", "L'ONASER"] },
        { q: "Quelle route relie le Burkina au Niger via Dori ?", a: "La RN3", o: ["La RN1", "La RN3", "La RN4", "La RN7"] },
        { q: "Quel est l'impact de la raffinerie d'or nationale ?", a: "Vendre l'or pur à sa vraie valeur", o: ["Fermer les mines", "Vendre l'or pur à sa vraie valeur", "Diminuer le prix", "Cacher l'or"] },
        { q: "Qui est la Ministre en charge de l'Action Humanitaire ?", a: "Nandy Somé/Diallo", o: ["Nandy Somé/Diallo", "Hadizatou Rosine Sori-Coulibaly", "Laure Zongo", "Inconnue"] },
        { q: "Dans quelle région se trouve le barrage de Bagré ?", a: "Centre-Est", o: ["Centre-Sud", "Centre-Est", "Est", "Sud-Ouest"] },
        { q: "Quel est le nom du chapeau traditionnel Mossi ?", a: "Le Luili-Pendé", o: ["Le Bonnet rouge", "Le Luili-Pendé", "Le Chapeau de Saponé", "Le Képi"] },
        { q: "Quelle ville abrite l'usine de transformation de mangues ?", a: "Bobo-Dioulasso (Dafani)", o: ["Ouahigouya", "Bobo-Dioulasso (Dafani)", "Dori", "Kaya"] },
        { q: "Quel est le but des pôles de croissance (ex: Bagrépôle) ?", a: "Développer l'économie régionale", o: ["Faire la fête", "Développer l'économie régionale", "Construire des écoles", "Le sport"] },
        { q: "Quel minerai est exploité à Mana ?", a: "L'Or", o: ["Le Fer", "L'Or", "Le Zinc", "Le Phosphate"] },
        { q: "Qui est le garant de l'indépendance de la justice ?", a: "Le Président du Faso", o: ["Le Premier Ministre", "Le Président du Faso", "Le Préfet", "Le Maire"] },
        { q: "Comment s'appelle la radio nationale du Burkina ?", a: "Radio Burkina", o: ["Faso FM", "Radio Burkina", "RFI", "Omega FM"] },
        { q: "Quelle ville est surnommée la cité de Bafuji ?", a: "Gaoua", o: ["Banfora", "Gaoua", "Diebougou", "Dano"] },
        { q: "Quel est le slogan du SIAO ?", a: "L'Artisanat africain, levier de développement", o: ["Vive l'art", "L'Artisanat africain, levier de développement", "Achetez local", "Faso d'abord"] },
        { q: "Quelle province abrite les ruines de Loropéni ?", a: "Poni", o: ["Poni", "Noumbiel", "Ioba", "Bougouriba"] },
        { q: "Quel est le nom du nouveau système de vote électronique ?", a: "Faso-Vote (Projet)", o: ["Google Vote", "Faso-Vote (Projet)", "Papier classique", "SMS"] },
        { q: "Quelle université porte le nom d'un historien célèbre ?", a: "Université Joseph Ki-Zerbo", o: ["Université Nazi Boni", "Université Joseph Ki-Zerbo", "Université de Koudougou", "Université de Dori"] },
        { q: "Quelle rivière traverse la ville de Ouagadougou ?", a: "Le Massili", o: ["Le Mouhoun", "Le Massili", "Le Nakambé", "Le Niger"] },
        { q: "Quel est le plat national à base de mil ou maïs ?", a: "Le Tô", o: ["Le Riz", "Le Tô", "Le Couscous", "Le Pain"] },
        { q: "Quel est le nom de la compagnie de sécurité privée nationale ?", a: "SOPASO", o: ["SOPASO", "G4S", "SECURICOM", "VDP"] },
        { q: "Qui a écrit 'L'Honneur de la Patrie' ?", a: "Thomas Sankara", o: ["Maurice Yaméogo", "Thomas Sankara", "Norbert Zongo", "Nazi Boni"] },
        { q: "Quelle ville est la porte d'entrée du Nord ?", a: "Ouahigouya", o: ["Kaya", "Ouahigouya", "Yako", "Kongoussi"] },
        { q: "Quel est le but de la décentralisation ?", a: "Rapprocher l'administration des citoyens", o: ["Diviser le pays", "Rapprocher l'administration des citoyens", "Donner de l'argent", "Voter moins"] },
        { q: "Comment s'appelle l'organe de gestion des élections ?", a: "La CENI", o: ["Le Ministère", "La CENI", "La Cour", "Le Tribunal"] },
        { q: "Quel est le cri de ralliement patriotique ?", a: "La Patrie ou la Mort, nous vaincrons !", o: ["Vive le Faso", "La Patrie ou la Mort, nous vaincrons !", "En avant", "Dieu bénisse"] }
    ];

    let score = 0;
    const list = document.getElementById('quiz-list');

    function init() {
        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `<span class="q-text">${i+1}. ${item.q}</span><div class="options" id="options-${i}"></div>`;
            list.appendChild(card);

            const optDiv = document.getElementById(`options-${i}`);
            item.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    // Signale que l'activité 3 est faite
                    localStorage.setItem('status_activite3', 'done');
                    
                    const allBtns = optDiv.querySelectorAll('button');
                    allBtns.forEach(b => b.disabled = true);
                    if(opt === item.a) {
                        btn.classList.add('btn-correct');
                        score++;
                    } else {
                        btn.classList.add('btn-wrong');
                        allBtns.forEach(b => { if(b.innerText === item.a) b.classList.add('btn-correct'); });
                    }
                    document.getElementById('score-float').innerText = `Votre Score : ${score} / 50`;
                };
                optDiv.appendChild(btn);
            });
        });
    }
    init();
</script>
</body>
</html>
