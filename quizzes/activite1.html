<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activité 1 - Actualités Burkina 2026</title>
    <style>
        :root {
            --primary: #2E7D32;
            --accent: #4CAF50;
            --wrong: #d32f2f;
            --correct: #388E3C;
            --bg: #f5f5f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .score-box { position: sticky; top: 10px; background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 10px; font-weight: bold; font-size: 1.2rem; z-index: 1000; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        h1 { color: var(--primary); text-align: center; margin-top: 20px; }
        .q-card { background: #fff; border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 12px; border-left: 5px solid #ccc; }
        .q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        button:hover:not(:disabled) { background: #f1f8e9; border-color: var(--accent); }
        .btn-correct { background: #c8e6c9 !important; border-color: var(--correct) !important; color: #1b5e20; font-weight: bold; }
        .btn-wrong { background: #ffcdd2 !important; border-color: var(--wrong) !important; color: #b71c1c; }
        .nav-btns { text-align: center; margin-top: 40px; }
        .btn-home { text-decoration: none; color: var(--primary); font-weight: bold; padding: 10px 20px; border: 2px solid var(--primary); border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-box" id="score-float">Votre Score : 0 / 50</div>
    
    <h1>Actualités Burkina Faso 2026</h1>

    <div id="quiz-list"></div>

    <div class="nav-btns">
        <a href="../index.html" class="btn-home">⬅ Retour au menu principal</a>
    </div>
</div>

<script>
    const quizData = [
        { q: "Quelle organisation remplace la CEDEAO pour le Burkina en 2026 ?", a: "L'AES (Alliance des États du Sahel)", o: ["L'UA", "L'AES (Alliance des États du Sahel)", "Le G5 Sahel", "L'UEMOA"] },
        { q: "Qui dirige la transition burkinabè en 2026 ?", a: "Capitaine Ibrahim Traoré", o: ["Paul-Henri Damiba", "Roch Kaboré", "Capitaine Ibrahim Traoré", "Blaise Compaoré"] },
        { q: "Quel est le statut des langues nationales dans la nouvelle constitution ?", a: "Langues officielles", o: ["Langues de travail", "Langues secondaires", "Langues officielles", "Langues étrangères"] },
        { q: "Quelle grande infrastructure minière a été inaugurée à Ouagadougou ?", a: "La Raffinerie d'or", o: ["L'usine de fer", "La Raffinerie d'or", "La mine de zinc", "Le centre du diamant"] },
        { q: "Quel pays préside la Confédération de l'AES en début 2026 ?", a: "Le Burkina Faso", o: ["Le Mali", "Le Niger", "Le Burkina Faso", "Le Tchad"] },
        { q: "Comment s'appelle le programme pour l'autosuffisance alimentaire ?", a: "Offensive Agro-pastorale", o: ["Plan Sésame", "Offensive Agro-pastorale", "Faso Riz", "Burkina Vert"] },
        { q: "Quelle ville accueille l'usine de transformation de Tomate 'Faso Tomate' ?", a: "Bobo-Dioulasso", o: ["Ouagadougou", "Koudougou", "Bobo-Dioulasso", "Loumbila"] },
        { q: "En 2026, quelle monnaie est au centre des projets de souveraineté ?", a: "La monnaie unique de l'AES", o: ["Le Franc CFA", "L'Euro", "La monnaie unique de l'AES", "Le Dollar"] },
        { q: "Quel est le rôle principal des VDP en 2026 ?", a: "Défense de la patrie", o: ["Gestion du trafic", "Défense de la patrie", "Administration", "Enseignement"] },
        { q: "Quelle institution remplace le Conseil Constitutionnel pour plus de souveraineté ?", a: "La Cour Constitutionnelle réformée", o: ["Le Sénat", "La Cour Constitutionnelle réformée", "Le Parlement", "L'Assemblée de transition"] },
        { q: "Quel grand partenaire stratégique fournit les drones de défense ?", a: "La Turquie", o: ["La France", "La Turquie", "Les USA", "Le Japon"] },
        { q: "Dans quelle région se situe le projet d'exploitation du manganèse de Tambao ?", a: "Sahel", o: ["Est", "Sahel", "Nord", "Boucle du Mouhoun"] },
        { q: "Quel est le nouveau slogan de la gendarmerie et de l'armée ?", a: "La Patrie ou la Mort, nous vaincrons !", o: ["Honneur et Patrie", "La Patrie ou la Mort, nous vaincrons !", "Unité et Justice", "Force et Courage"] },
        { q: "Quelle banque a été créée pour financer l'économie réelle ?", a: "La Banque de Dépôts du Trésor", o: ["BCEAO", "Banque de Dépôts du Trésor", "World Bank", "BOAD"] },
        { q: "Quel produit est transformé à l'usine de Koudougou en 2026 ?", a: "Le Textile (Coton)", o: ["Le Sucre", "Le Textile (Coton)", "Le Plastique", "Le Lait"] },
        { q: "Comment appelle-t-on le regroupement Mali-Niger-Burkina ?", a: "Le Liptako-Gourma (AES)", o: ["Le Sahel Vert", "Le Liptako-Gourma (AES)", "Le Bloc Ouest", "La Zone Franc"] },
        { q: "Quel pays de l'AES partage la plus longue frontière avec le Burkina ?", a: "Le Mali", o: ["Le Niger", "Le Mali", "Le Togo", "Le Bénin"] },
        { q: "Quelle fête nationale est célébrée avec plus de ferveur patriotique ?", a: "Le 11 Décembre", o: ["Le 14 Juillet", "Le 1er Mai", "Le 11 Décembre", "Le 15 Août"] },
        { q: "Qui est le porte-parole du gouvernement en 2026 ?", a: "Jean-Emmanuel Ouédraogo", o: ["Rimtalba Jean Emmanuel Ouédraogo", "Alpha Barry", "Lionel Bilgo", "Inconnu"] },
        { q: "Quelle infrastructure relie Ouaga à Bobo via le bitume neuf ?", a: "L'autoroute de contournement", o: ["Le chemin de fer", "L'autoroute de contournement", "Le pont de l'espoir", "La route du désert"] },
        { q: "Quel est le premier partenaire militaire non-africain en 2026 ?", a: "La Russie", o: ["La France", "La Russie", "L'Allemagne", "Le Canada"] },
        { q: "Quel sport national voit son stade (du 4 Août) enfin homologué ?", a: "Le Football", o: ["Le Cyclisme", "Le Football", "La Lutte", "Le Karaté"] },
        { q: "Quel festival de cinéma se tient à Ouaga en 2025/2026 ?", a: "Le FESPACO", o: ["Le SIAO", "Le FESPACO", "La SNC", "Le Jazz à Ouaga"] },
        { q: "Quel est l'objectif du projet 'Un étudiant, un ordinateur' ?", a: "Numérisation de l'éducation", o: ["Vente de matériel", "Numérisation de l'éducation", "Cadeau de Noël", "Concours de jeux"] },
        { q: "Quel pays de l'AES n'a pas d'accès à la mer comme le Burkina ?", a: "Le Mali et le Niger", o: ["Le Mali et le Niger", "Le Sénégal", "La Côte d'Ivoire", "Le Ghana"] },
        { q: "Quelle usine de fabrication de médicaments est située à Kokologho ?", a: "Propharm", o: ["Propharm", "Faso Pharma", "Sanofi", "CAMEG"] },
        { q: "Quelle est la vision diplomatique du Burkina en 2026 ?", a: "Le Multipolaire", o: ["L'Occidentalisme", "Le Multipolaire", "L'Isolement", "Le Colonialisme"] },
        { q: "Qui assure la sécurité dans les villages reconquis ?", a: "Les FDS et VDP", o: ["L'ONU", "Les FDS et VDP", "La Police municipale", "L'Armée étrangère"] },
        { q: "Quel est le but de la 'Semaine Nationale de la Citoyenneté' ?", a: "Le civisme et patriotisme", o: ["Le sport", "Le civisme et patriotisme", "La cuisine", "Le commerce"] },
        { q: "Quel minéral est utilisé comme engrais au Burkina ?", a: "Le Phosphate", o: ["L'Or", "Le Phosphate", "Le Sel", "Le Charbon"] },
        { q: "Quel barrage fournit l'électricité propre au pays ?", a: "Bagré et Bagré-pôle", o: ["Soubré", "Bagré et Bagré-pôle", "Assouan", "Kandaji"] },
        { q: "Quel grand marché artisanal a lieu tous les 2 ans ?", a: "Le SIAO", o: ["Le SIAO", "Le FESPACO", "La SNC", "Le Salon de l'Auto"] },
        { q: "Quelle culture de rente remplace progressivement le coton ?", a: "L'Anacarde et le Soja", o: ["Le Tabac", "L'Anacarde et le Soja", "La Canne à sucre", "Le Café"] },
        { q: "Quel nouveau code régit l'exploitation minière ?", a: "Le Code minier souverain de 2023", o: ["Le Code de 1960", "Le Code minier souverain de 2023", "Le Code colonial", "Le Code civil"] },
        { q: "Quelle province abrite le plus de déplacés retournés en 2026 ?", a: "Le Soum", o: ["Le Soum", "Le Kadiogo", "Le Houet", "Le Bazèga"] },
        { q: "Qui est le chef d'État-Major Général des Armées ?", a: "Général Célestin Simporé", o: ["Général Simporé", "Général Traoré", "Colonel Sadou", "Colonel Camara"] },
        { q: "Quelle plateforme numérique gère les concours de la fonction publique ?", a: "e-Concours", o: ["Facebook", "WhatsApp", "e-Concours", "Google Quiz"] },
        { q: "Quel fleuve burkinabè irrigue les plaines rizicoles de Sourou ?", a: "Le Mouhoun", o: ["Le Niger", "Le Mouhoun", "Le Nil", "Le Sénégal"] },
        { q: "Quelle plante est le symbole de la résistance écologique ?", a: "Le Karité", o: ["Le Karité", "Le Baobab", "Le Palmier", "L'Eucalyptus"] },
        { q: "Quel est le nouveau délai de validité du passeport AES ?", a: "10 ans", o: ["5 ans", "10 ans", "2 ans", "Illimité"] },
        { q: "Quelle ville est la capitale de la culture en 2026 ?", a: "Bobo-Dioulasso (SNC)", o: ["Ouaga", "Bobo-Dioulasso (SNC)", "Banfora", "Dori"] },
        { q: "Quel est le montant approximatif du budget national 2026 ?", a: "Plus de 3000 milliards FCFA", o: ["100 milliards", "1000 milliards", "Plus de 3000 milliards FCFA", "5000 milliards"] },
        { q: "Quelle direction gère le recrutement des VDP ?", a: "La BVDP", o: ["La Police", "La BVDP", "Le Maire", "Le Préfet"] },
        { q: "Quel média international a été suspendu pour désinformation ?", a: "France 24 / RFI", o: ["CNN", "RTB", "France 24 / RFI", "Al Jazeera"] },
        { q: "Quel pays de l'AES possède un accès au fleuve Niger ?", a: "Le Mali et le Niger", o: ["Le Burkina", "Le Mali et le Niger", "Le Tchad", "Le Togo"] },
        { q: "Comment s'appelle l'agence de presse nationale ?", a: "AIB", o: ["AFP", "AIB", "Reuters", "Faso Actu"] },
        { q: "Quel mois marque la fête de l'indépendance ?", a: "Août", o: ["Janvier", "Août", "Décembre", "Novembre"] },
        { q: "Quel secteur reçoit le plus gros budget ?", a: "La Défense et Sécurité", o: ["Le Sport", "Le Tourisme", "La Défense et Sécurité", "Le Cinéma"] },
        { q: "Quel oiseau est sur les armoiries (avant réforme) ?", a: "L'Épervier", o: ["Le Pigeon", "L'Épervier", "L'Autruche", "Le Corbeau"] },
        { q: "Quel est le vêtement national obligatoire pour les cérémonies ?", a: "Le Faso Dan Fani", o: ["Le Costume", "Le Faso Dan Fani", "Le Jean", "Le Boubou"] }
    ];

    let score = 0;
    const list = document.getElementById('quiz-list');

    function init() {
        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `<span class="q-text">${i+1}. ${item.q}</span><div class="options" id="options-${i}"></div>`;
            list.appendChild(card);

            const optDiv = document.getElementById(`options-${i}`);
            item.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    // Signale que l'activité est faite pour l'index
                    localStorage.setItem('status_activite1', 'done');
                    
                    const allBtns = optDiv.querySelectorAll('button');
                    allBtns.forEach(b => b.disabled = true);
                    if(opt === item.a) {
                        btn.classList.add('btn-correct');
                        score++;
                    } else {
                        btn.classList.add('btn-wrong');
                        allBtns.forEach(b => { if(b.innerText === item.a) b.classList.add('btn-correct'); });
                    }
                    document.getElementById('score-float').innerText = `Votre Score : ${score} / 50`;
                };
                optDiv.appendChild(btn);
            });
        });
    }
    init();
</script>
</body>
</html>
